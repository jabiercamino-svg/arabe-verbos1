  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 48px;
    }
    h1 {
      font-family: Arial, sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #f0c070;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      font-weight: 300;
      color: #8a8090;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .btn {
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 28px;
      border-radius: 30px;
      border: 1px solid #3a3050;
      background: transparent;
      color: #e8e0d0;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    }
    .btn:hover { background: #2a2045; border-color: #f0c070; color: #f0c070; }
    .btn:active { transform: scale(0.97); }
    .btn.active { background: #f0c070; color: #1a1a2e; border-color: #f0c070; }
    .card-container {
      perspective: 1200px;
      width: 100%;
      max-width: 700px;
      height: 380px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped { transform: rotateY(180deg); }
    .side {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      text-align: center;
      gap: 12px;
    }
    .front { background: #12122a; border: 1px solid #2e2850; }
    .back { transform: rotateY(180deg); background: #1e1840; border: 1px solid #f0c070; }
    .arabic {
      font-family: Arial, sans-serif;
      font-size: 44px;
      direction: rtl;
      color: #f0c070;
      line-height: 1.2;
    }
    .hint { font-size: 12px; color: #4a4060; letter-spacing: 2px; text-transform: uppercase; }
    .pronunciation { font-size: 20px; font-style: italic; color: #a090c0; font-weight: 300; }
    .meaning { font-size: 24px; font-weight: 700; color: #e8e0d0; }
    .help { margin-top: 24px; font-size: 11px; color: #3a3050; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
    @media (max-width: 500px) {
      .arabic { font-size: 32px; }
      .card-container { height: 300px; }
      h1 { font-size: 30px; }
    }
  </style>
</head>

    <div class="card" id="card" onclick="flipCard()">

      pronouns.forEach((pronoun, pronIdx) => {
        const form = verb.forms[pronoun.key];
        const spanishConj = conjug[verbIdx] ? conjug[verbIdx][pronIdx] : verb.infinitive;
        cards.push({
          front: `${pronoun.label} (${verb.base})`,
          backArabic: form[0],
          pronunciation: form[1],
          meaning: `${pronoun.meaning} ${spanishConj}`
        });
      });
    });

    let current = 0;
    let randomMode = false;

    const card = document.getElementById('card');
    const front = document.getElementById('front');
    const back = document.getElementById('back');
    const randomBtn = document.getElementById('randomBtn');

    function renderCard() {
      const c = cards[current];
      front.innerHTML = `
        <div class="arabic">${c.front}</div>
        <div class="hint">toca para ver la respuesta</div>
      `;
      back.innerHTML = `
        <div class="arabic">${c.backArabic}</div>
        <div class="pronunciation">${c.pronunciation}</div>
        <div class="meaning">${c.meaning}</div>
      `;
      card.classList.remove('flipped');
    }

    function flipCard() { card.classList.toggle('flipped'); }

    function nextCard() {
      current = randomMode
        ? Math.floor(Math.random() * cards.length)
        : (current + 1) % cards.length;
      renderCard();
    }

    function prevCard() {
      current = randomMode
        ? Math.floor(Math.random() * cards.length)
        : (current - 1 + cards.length) % cards.length;
      renderCard();
    }

    function toggleRandom() {
      randomMode = !randomMode;
      randomBtn.textContent = `🔀 Aleatorio: ${randomMode ? 'SÍ' : 'NO'}`;
      randomBtn.classList.toggle('active', randomMode);
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      current = 0;
      renderCard();
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    renderCard();
